<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Arcade night setup</title>
  <desc id="desc">A room diagram for a local multiplayer article.</desc>
  <rect width="1200" height="720" fill="#ececec" />
  <rect x="85" y="85" width="1030" height="550" fill="#fafafa" stroke="#7d7d7d" stroke-width="6" />
  <rect x="155" y="150" width="270" height="180" fill="#dbe6d4" stroke="#70845d" stroke-width="4" />
  <rect x="470" y="150" width="255" height="180" fill="#e8e1d3" stroke="#8e7d5a" stroke-width="4" />
  <rect x="770" y="150" width="275" height="180" fill="#dde7f2" stroke="#61758f" stroke-width="4" />
  <rect x="255" y="410" width="670" height="120" fill="#f0f0f0" stroke="#777777" stroke-width="4" />
  <text x="210" y="240" fill="#1f1f1f" font-family="Georgia, serif" font-size="30">tv</text>
  <text x="546" y="240" fill="#1f1f1f" font-family="Georgia, serif" font-size="30">snacks</text>
  <text x="862" y="240" fill="#1f1f1f" font-family="Georgia, serif" font-size="30">backup games</text>
  <text x="470" y="485" fill="#1f1f1f" font-family="Arial, Helvetica, sans-serif" font-size="28">players, controllers, and the easy first game</text>
</svg>
