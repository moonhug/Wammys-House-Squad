<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Weekend picks grid</title>
  <desc id="desc">A second visual showing simple recommendation buckets for the Korean template post.</desc>
  <rect width="1200" height="720" fill="#ebebeb" />
  <rect x="90" y="90" width="1020" height="540" fill="#fcfcfc" stroke="#797979" stroke-width="6" />
  <rect x="150" y="160" width="900" height="84" fill="#252525" />
  <text x="204" y="214" fill="#f3f3f3" font-family="Arial, Helvetica, sans-serif" font-size="30">pick buckets</text>
  <rect x="170" y="300" width="240" height="210" fill="#e8dfcf" stroke="#8f7b57" stroke-width="4" />
  <rect x="480" y="300" width="240" height="210" fill="#dce7f2" stroke="#627995" stroke-width="4" />
  <rect x="790" y="300" width="240" height="210" fill="#dfe8d8" stroke="#6b8250" stroke-width="4" />
  <text x="220" y="368" fill="#1f1f1f" font-family="Georgia, serif" font-size="28">short</text>
  <text x="535" y="368" fill="#1f1f1f" font-family="Georgia, serif" font-size="28">co-op</text>
  <text x="840" y="368" fill="#1f1f1f" font-family="Georgia, serif" font-size="28">chill</text>
  <text x="205" y="430" fill="#1f1f1f" font-family="Arial, Helvetica, sans-serif" font-size="22">laugh fast</text>
  <text x="515" y="430" fill="#1f1f1f" font-family="Arial, Helvetica, sans-serif" font-size="22">play together</text>
  <text x="843" y="430" fill="#1f1f1f" font-family="Arial, Helvetica, sans-serif" font-size="22">talk more</text>
</svg>
