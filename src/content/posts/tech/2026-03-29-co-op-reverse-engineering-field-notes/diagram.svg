<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Co-op reverse engineering diagram</title>
  <desc id="desc">A simple diagram linking strings, helper renaming, and article notes.</desc>
  <rect width="1200" height="720" fill="#ededed" />
  <rect x="90" y="90" width="1020" height="540" fill="#ffffff" stroke="#7f7f7f" stroke-width="6" />
  <rect x="145" y="180" width="240" height="110" fill="#e8eff8" stroke="#647ea5" stroke-width="4" />
  <rect x="480" y="180" width="240" height="110" fill="#f4f1e8" stroke="#8b7d58" stroke-width="4" />
  <rect x="815" y="180" width="240" height="110" fill="#eaf1e3" stroke="#6f8450" stroke-width="4" />
  <rect x="312" y="405" width="240" height="110" fill="#f2e8ea" stroke="#9a6770" stroke-width="4" />
  <rect x="650" y="405" width="240" height="110" fill="#ececec" stroke="#7b7b7b" stroke-width="4" />
  <text x="190" y="245" fill="#202020" font-family="Arial, Helvetica, sans-serif" font-size="28">strings</text>
  <text x="522" y="245" fill="#202020" font-family="Arial, Helvetica, sans-serif" font-size="28">helpers</text>
  <text x="868" y="245" fill="#202020" font-family="Arial, Helvetica, sans-serif" font-size="28">notes</text>
  <text x="350" y="470" fill="#202020" font-family="Arial, Helvetica, sans-serif" font-size="28">rename pass</text>
  <text x="715" y="470" fill="#202020" font-family="Arial, Helvetica, sans-serif" font-size="28">article draft</text>
  <line x1="385" y1="235" x2="480" y2="235" stroke="#3a3a3a" stroke-width="4" />
  <line x1="720" y1="235" x2="815" y2="235" stroke="#3a3a3a" stroke-width="4" />
  <line x1="600" y1="290" x2="432" y2="405" stroke="#3a3a3a" stroke-width="4" />
  <line x1="720" y1="290" x2="770" y2="405" stroke="#3a3a3a" stroke-width="4" />
</svg>
